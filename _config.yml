# Jekyll Configuration for Nonna GitHub Pages Site
title: The Regina "Nonna G" Russo Alphabet Series
description: 26 Mysteries · 26 Letters · One Unstoppable Grandmother
author: Kyle Jimenez
theme: minima

# Site settings
url: https://zombie760.github.io
baseurl: /nonna

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude files
exclude:
  - README.md
  - .gitignore
  - Gemfile
  - Gemfile.lock

# Collections
collections:
  books:
    output: true
    permalink: /:name/

# Default front matter
defaults:
  -
    scope:
      path: ""
      type: "books"
    values:
      layout: "book"
