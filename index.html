<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>NONNA — The Regina Russo Alphabet Series</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root {
  --wall-bg: #0a0a0a;
  --wall-texture: #141414;
  --paper-aged: #e8e0d5;
  --paper-yellow: #d4c4a0;
  --ink-black: #0a0a0a;
  --accent-gold: #c9a86c;
  --accent-blood: #8b2635;
  --string-red: #ff2a2a;
  --pin-head: #8b0000;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--wall-bg);
  font-family: 'Crimson Text', Georgia, serif;
  color: var(--paper-aged);
}

/* UI Overlay */
#ui {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
  padding: 1.5rem 2rem;
  pointer-events: none;
}

#ui h1 {
  font-family: 'Cinzel', serif;
  font-size: 2rem;
  font-weight: 900;
  color: var(--accent-gold);
  letter-spacing: 0.15em;
  text-shadow: 0 0 20px rgba(201,168,108,0.3);
  margin-bottom: 0.3rem;
}

#ui .subtitle {
  font-size: 0.9rem;
  color: var(--paper-yellow);
  opacity: 0.8;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

#ui .controls {
  position: absolute;
  top: 1.5rem;
  right: 2rem;
  display: flex;
  gap: 0.5rem;
  pointer-events: auto;
}

#ui button {
  background: rgba(139, 38, 53, 0.3);
  border: 1px solid var(--accent-blood);
  color: var(--paper-aged);
  padding: 0.5rem 1rem;
  font-family: 'Special Elite', monospace;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.3s ease;
}

#ui button:hover {
  background: var(--accent-blood);
  box-shadow: 0 0 10px rgba(139, 38, 53, 0.5);
}

/* Main Stage */
#stage {
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(45deg, transparent, transparent 100px, rgba(201,168,108,0.02) 100px, rgba(201,168,108,0.02) 102px),
    repeating-linear-gradient(-45deg, transparent, transparent 150px, rgba(139,38,53,0.03) 150px, rgba(139,38,53,0.03) 152px),
    radial-gradient(ellipse at 30% 20%, rgba(139, 38, 53, 0.1), transparent 50%),
    linear-gradient(180deg, #0a0a0a 0%, #0d0d0d 50%, #050505 100%);
  cursor: grab;
  overflow: hidden;
}

#stage.panning { cursor: grabbing; }

#world {
  position: absolute;
  width: 4000px;
  height: 3000px;
  transform-origin: 0 0;
}

/* Evidence Cards */
.card {
  position: absolute;
  width: 320px;
  background: var(--paper-aged);
  color: var(--ink-black);
  padding: 1.5rem;
  box-shadow:
    0 4px 20px rgba(0,0,0,0.4),
    inset 0 0 60px rgba(139,69,19,0.05);
  cursor: grab;
  user-select: none;
  transform-origin: center top;
}

.card::before {
  content: '';
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 12px;
  height: 12px;
  background: radial-gradient(circle at 30% 30%, #ff4444, var(--pin-head));
  border-radius: 50%;
  box-shadow:
    inset -2px -2px 4px rgba(0,0,0,0.3),
    2px 2px 4px rgba(0,0,0,0.5);
}

.card.book-a { border-left: 4px solid var(--accent-blood); }
.card.book-b { border-left: 4px solid #8b6914; }
.card.book-c { border-left: 4px solid #4a6741; }

.card-header {
  font-family: 'Special Elite', monospace;
  font-size: 0.75rem;
  color: var(--accent-blood);
  letter-spacing: 0.1em;
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.card-title {
  font-family: 'Cinzel', serif;
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 0.75rem;
  line-height: 1.2;
}

.card-summary {
  font-size: 0.95rem;
  line-height: 1.5;
  margin-bottom: 1rem;
  opacity: 0.9;
}

.card-meta {
  font-family: 'Special Elite', monospace;
  font-size: 0.7rem;
  color: #666;
  border-top: 1px dashed #999;
  padding-top: 0.5rem;
}

.card-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 1rem;
}

.card-btn {
  flex: 1;
  background: var(--ink-black);
  color: var(--paper-aged);
  border: none;
  padding: 0.5rem;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  transition: all 0.2s ease;
}

.card-btn:hover {
  background: var(--accent-blood);
}

/* Connection Strings */
#strings {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.string {
  stroke: var(--string-red);
  stroke-width: 1.5;
  opacity: 0.6;
  fill: none;
}

/* Minimap */
#minimap {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 200px;
  height: 150px;
  background: rgba(0,0,0,0.8);
  border: 2px solid var(--accent-blood);
  z-index: 100;
}

#minimap-viewport {
  position: absolute;
  border: 2px solid var(--accent-gold);
  background: rgba(201,168,108,0.1);
}

.card-dot {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent-blood);
}

.card-dot.book-a { background: var(--accent-blood); }
.card-dot.book-b { background: #8b6914; }
.card-dot.book-c { background: #4a6741; }

/* Legend */
#legend {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.9);
  border: 1px solid var(--accent-blood);
  padding: 1rem;
  z-index: 100;
  font-family: 'Special Elite', monospace;
  font-size: 0.8rem;
}

#legend h3 {
  font-family: 'Cinzel', serif;
  color: var(--accent-gold);
  margin-bottom: 0.5rem;
  font-size: 0.9rem;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin: 0.3rem 0;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}

.dot.book-a { background: var(--accent-blood); }
.dot.book-b { background: #8b6914; }
.dot.book-c { background: #4a6741; }

/* Modal */
#modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 200;
  justify-content: center;
  align-items: center;
}

#modal-content {
  background: var(--paper-aged);
  color: var(--ink-black);
  padding: 2rem;
  max-width: 600px;
  max-height: 80vh;
  overflow-y: auto;
  position: relative;
}

#modal-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  font-size: 1.5rem;
  cursor: pointer;
  color: var(--accent-blood);
}

/* Mobile */
@media (max-width: 768px) {
  #ui h1 { font-size: 1.3rem; }
  #ui .controls { position: static; margin-top: 1rem; }
  .card { width: 280px; }
  #minimap { width: 120px; height: 90px; }
}
</style>
</head>
<body>

<div id="ui">
  <h1>NONNA</h1>
  <p class="subtitle">The Alphabet Series · Evidence Board</p>
  <div class="controls">
    <button id="zoom-in">+</button>
    <button id="zoom-out">−</button>
    <button id="reset-view">Reset</button>
    <button id="toggle-strings">Strings</button>
  </div>
</div>

<div id="stage">
  <div id="world">
    <svg id="strings"></svg>
  </div>
</div>

<div id="minimap">
  <div id="minimap-viewport"></div>
</div>

<div id="legend">
  <h3>Books</h3>
  <div class="legend-item"><span class="dot book-a"></span> A is for Archive</div>
  <div class="legend-item"><span class="dot book-b"></span> B is for Bloodline</div>
  <div class="legend-item"><span class="dot book-c"></span> C is for Custody</div>
</div>

<div id="modal">
  <div id="modal-content">
    <span id="modal-close">×</span>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// Book data
const books = [
  {
    id: 'book-a',
    letter: 'A',
    title: 'A is for Archive',
    chapter: "The Librarian's Box",
    summary: 'Regina discovers a box of letters from 1947 that document a quiet land transfer from a Japanese-American family to a defense contractor holding company.',
    theme: 'buried secrets',
    pdf: 'books/A_is_for_Archive.pdf',
    audio: 'audio/A_is_for_Archive.mp3',
    x: 500, y: 400,
    rotation: -3
  },
  {
    id: 'book-b',
    letter: 'B',
    title: 'B is for Bloodline',
    chapter: 'The Box on the Doorstep',
    summary: 'A box arrives containing secrets about Regina\'s own family. As she traces the bloodline, she discovers some inheritances come with debts that can never be repaid.',
    theme: 'family sins',
    pdf: 'books/B_is_for_Bloodline.pdf',
    audio: 'audio/B_is_for_Bloodline.mp3',
    x: 1000, y: 600,
    rotation: 2
  },
  {
    id: 'book-c',
    letter: 'C',
    title: 'C is for Custody',
    chapter: "The Father's Request",
    summary: 'A custody battle reveals connections between a father\'s law firm and Pacific Meridian Holdings. Regina must choose between a child\'s safety and exposing the conspiracy.',
    theme: 'institutional corruption',
    pdf: 'books/C_is_for_Custody.pdf',
    audio: 'audio/C_is_for_Custody.mp3',
    x: 1500, y: 350,
    rotation: -2
  }
];

// Characters
const characters = [
  { id: 'regina', name: 'Regina Russo', role: 'Protagonist', type: 'investigator', x: 800, y: 300 },
  { id: 'maeve', name: 'Maeve Russo', role: 'Mother', type: 'witness', x: 600, y: 200 },
  { id: 'ray', name: 'Ray Delgado', role: 'Harbor View PD', type: 'ally', x: 1100, y: 450 },
  { id: 'paperclip', name: 'Paperclip', role: 'The Cat', type: 'mascot', x: 750, y: 500 },
  { id: 'pacific', name: 'Pacific Meridian', role: 'The Holding Company', type: 'antagonist', x: 1300, y: 250 }
];

// Connections
const connections = [
  { from: 'regina', to: 'book-a' },
  { from: 'regina', to: 'book-b' },
  { from: 'regina', to: 'book-c' },
  { from: 'maeve', to: 'regina' },
  { from: 'book-a', to: 'book-b' },
  { from: 'book-b', to: 'book-c' },
  { from: 'pacific', to: 'book-a' },
  { from: 'pacific', to: 'book-c' },
  { from: 'ray', to: 'regina' },
  { from: 'ray', to: 'book-c' }
];

// State
let scale = 1, translateX = 0, translateY = 0;
let isPanning = false, showStrings = true;
let startX, startY;

const stage = document.getElementById('stage');
const world = document.getElementById('world');
const stringsSvg = document.getElementById('strings');

// Helper to create element with text content
function createEl(tag, className, text) {
  const el = document.createElement(tag);
  if (className) el.className = className;
  if (text) el.textContent = text;
  return el;
}

// Create book cards
function createCards() {
  books.forEach(book => {
    const card = createEl('div', 'card ' + book.id);
    card.id = book.id;
    card.style.left = book.x + 'px';
    card.style.top = book.y + 'px';
    card.style.transform = 'rotate(' + book.rotation + 'deg)';

    const header = createEl('div', 'card-header', 'Book ' + book.letter + ' · ' + book.chapter);
    const title = createEl('h3', 'card-title', book.title);
    const summary = createEl('p', 'card-summary', book.summary);
    const meta = createEl('div', 'card-meta', 'Theme: ' + book.theme);

    const actions = createEl('div', 'card-actions');

    const pdfBtn = createEl('a', 'card-btn', '📖 PDF');
    pdfBtn.href = book.pdf;
    pdfBtn.target = '_blank';

    const audioBtn = createEl('a', 'card-btn', '🎧 Audio');
    audioBtn.href = book.audio;
    audioBtn.target = '_blank';

    actions.appendChild(pdfBtn);
    actions.appendChild(audioBtn);

    card.appendChild(header);
    card.appendChild(title);
    card.appendChild(summary);
    card.appendChild(meta);
    card.appendChild(actions);

    world.appendChild(card);
  });

  // Create character cards
  characters.forEach(char => {
    const card = createEl('div', 'card character');
    card.id = char.id;
    card.style.left = char.x + 'px';
    card.style.top = char.y + 'px';
    card.style.width = '200px';
    card.style.padding = '1rem';
    card.style.transform = 'rotate(' + (Math.random() * 6 - 3) + 'deg)';

    const header = createEl('div', 'card-header', char.role);
    const title = createEl('h3', 'card-title', char.name);
    title.style.fontSize = '1.1rem';

    card.appendChild(header);
    card.appendChild(title);

    world.appendChild(card);
  });
}

// Draw connection strings
function drawStrings() {
  stringsSvg.innerHTML = '';
  if (!showStrings) return;

  connections.forEach(conn => {
    const fromEl = document.getElementById(conn.from);
    const toEl = document.getElementById(conn.to);
    if (!fromEl || !toEl) return;

    const fromRect = fromEl.getBoundingClientRect();
    const toRect = toEl.getBoundingClientRect();
    const worldRect = world.getBoundingClientRect();

    const x1 = (fromRect.left - worldRect.left) / scale + fromRect.width / 2;
    const y1 = (fromRect.top - worldRect.top) / scale + 20;
    const x2 = (toRect.left - worldRect.left) / scale + toRect.width / 2;
    const y2 = (toRect.top - worldRect.top) / scale + 20;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.classList.add('string');
    stringsSvg.appendChild(line);
  });
}

// Update transform
function updateTransform() {
  world.style.transform = 'translate(' + translateX + 'px, ' + translateY + 'px) scale(' + scale + ')';
  drawStrings();
}

// Pan controls
stage.addEventListener('mousedown', e => {
  if (e.target.closest('.card')) return;
  isPanning = true;
  startX = e.clientX - translateX;
  startY = e.clientY - translateY;
  stage.classList.add('panning');
});

window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  translateX = e.clientX - startX;
  translateY = e.clientY - startY;
  updateTransform();
});

window.addEventListener('mouseup', () => {
  isPanning = false;
  stage.classList.remove('panning');
});

// Touch support
stage.addEventListener('touchstart', e => {
  if (e.target.closest('.card')) return;
  isPanning = true;
  startX = e.touches[0].clientX - translateX;
  startY = e.touches[0].clientY - translateY;
});

window.addEventListener('touchmove', e => {
  if (!isPanning) return;
  translateX = e.touches[0].clientX - startX;
  translateY = e.touches[0].clientY - startY;
  updateTransform();
});

window.addEventListener('touchend', () => {
  isPanning = false;
});

// Zoom controls
document.getElementById('zoom-in').addEventListener('click', () => {
  scale = Math.min(scale * 1.2, 3);
  updateTransform();
});

document.getElementById('zoom-out').addEventListener('click', () => {
  scale = Math.max(scale / 1.2, 0.3);
  updateTransform();
});

document.getElementById('reset-view').addEventListener('click', () => {
  scale = 1;
  translateX = 0;
  translateY = 0;
  updateTransform();
});

document.getElementById('toggle-strings').addEventListener('click', () => {
  showStrings = !showStrings;
  drawStrings();
});

// Wheel zoom
stage.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.3, Math.min(3, scale * delta));
  updateTransform();
});

// Initialize
createCards();
updateTransform();

// Redraw strings on resize
window.addEventListener('resize', drawStrings);
</script>

</body>
</html>
